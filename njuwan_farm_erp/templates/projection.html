{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">3-Year Growth Projection</h2>

<div class="mb-4">
    <img src="https://source.unsplash.com/1200x400/?business,growth,chart" class="img-fluid rounded shadow">
</div>

<canvas id="profitChart"></canvas>

<hr class="my-4">

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Year</th>
            <th>Milk Output</th>
            <th>Revenue</th>
            <th>Expense</th>
            <th>Profit</th>
            <th>Cows</th>
            <th>Acreage</th>
        </tr>
    </thead>
    <tbody>
        {% for row in data %}
        <tr>
            <td>{{ row.year }}</td>
            <td>{{ row.milk }}</td>
            <td>{{ row.income }}</td>
            <td>{{ row.expense }}</td>
            <td>{{ row.profit }}</td>
            <td>{{ row.cows }}</td>
            <td>{{ row.acreage }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
const ctx = document.getElementById('profitChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: {{ data | map(attribute='year') | list }},
        datasets: [{
            label: 'Projected Profit',
            data: {{ data | map(attribute='profit') | list }},
            borderWidth: 3
        }]
    }
});
</script>
<canvas id="revenueGrowthChart" width="400" height="200"></canvas>

<script>
    const ctx = document.getElementById('revenueGrowthChart').getContext('2d');
    
    // Core data from your seeded herd
    const currentHerd = 30;
    const avgMilkPerCow = 25; // Liter average from your seed.py logic
    const pricePerLiter = 50; // Current Kenyan market estimate
    const growthRate = 0.13; // Based on your 4 active pregnancies

    const labels = ['2026', '2027', '2028', '2029'];
    
    // Calculate projections
    const herdData = labels.map((_, i) => Math.round(currentHerd * Math.pow(1 + growthRate, i)));
    const revenueData = herdData.map(count => count * avgMilkPerCow * pricePerLiter);

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Herd Size (Cows)',
                    data: herdData,
                    borderColor: '#2d6a4f',
                    backgroundColor: 'rgba(45, 106, 79, 0.1)',
                    yAxisID: 'y',
                    fill: true
                },
                {
                    label: 'Daily Revenue (KES)',
                    data: revenueData,
                    borderColor: '#ffc107', // Warning yellow to match your dashboard
                    borderDash: [5, 5],
                    yAxisID: 'y1'
                }
            ]
        },
        options: {
            scales: {
                y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Number of Cows' } },
                y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Daily Income (KES)' } }
            }
        }
    });
</script>

{% endblock %}
