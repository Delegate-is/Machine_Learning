{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Add Feed Record</h2>
    <div>
        <img src="{{ url_for('static', filename='images/feed.jpg') }}" class="img-fluid rounded shadow">
    </div>
    <form method="POST">
        <div class="mb-3">
            <label for="cow_id" class="form-label">Select Cow (Name & Tag)</label>
            <select class="form-control" name="cow_id" required>
                <option value="" disabled selected>-- Select the cow you are feeding --</option>
                {% for cow in cows %}
                <option value="{{ cow.id }}">
                    {{ cow.name if cow.name else "Unnamed" }} | Tag: {{ cow.tag_number }} ({{ cow.breed }})
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label>Feed Type (e.g., Silage, Concentrates)</label>
            <input type="text" name="feed_type" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Quantity (kg)</label>
            <input type="number" step="0.01" name="quantity" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Cost (KES)</label>
            <input type="number" step="0.01" name="cost" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Save Feed Entry</button>
    </form>
</div>
{% endblock %}
