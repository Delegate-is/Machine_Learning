{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Add Feed Record</h2>
    <div>
        <img src="{{ url_for('static', filename='images/feed.jpg') }}" class="img-fluid rounded shadow">
    </div>
    <form method="POST">
        <div class="mb-3">
            <label>Cow Tag Number</label>
            <input type="text" name="tag_number" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Feed Type (e.g., Silage, Concentrates)</label>
            <input type="text" name="feed_type" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Quantity (kg)</label>
            <input type="number" step="0.01" name="quantity" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Cost (KES)</label>
            <input type="number" step="0.01" name="cost" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Save Feed Entry</button>
    </form>
</div>
{% endblock %}
