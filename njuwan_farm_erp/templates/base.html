<!DOCTYPE html>
<html>
<head>
    <title>Njuwan Farm Intelligence</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1b4332, #2d6a4f);
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding-top: 20px;
            transition: 0.3s ease;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        .sidebar a {
            display: block;
            color: #fff;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Content */
        .content {
            margin-left: 250px;
            padding: 30px;
            transition: 0.3s ease;
        }

        .content.expanded {
            margin-left: 70px;
        }

        /* Glass Cards */
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        /* Fade Animation */
        .fade-in {
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .topbar {
            text-align: right;
            margin-bottom: 15px;
        }

        .btn-custom {
            background: #40916c;
            border: none;
            color: white;
        }

        .btn-custom:hover {
            background: #2d6a4f;
        }
    </style>
</head>

<body>
<div class="sidebar">
    <h5 class="text-center mb-4">🌾 Njuwan ERP</h5>

    <a href="/">Dashboard</a>
    <a href="/add_cow">Add Cow</a>
    <a href="/add_milk">Add Milk</a>
    <a href="/cow_efficiency">Cow Ranking</a>
    <a href="/add_feed">Add Feed Entry</a>
    <a href="/feed-efficiency">Feed Simulator</a>
    <a href="/add_crop">Add Crop</a>
    <a href="/add_transaction">Transactions</a>
    <a href="/yoghurt">Yoghurt</a>
    <a href="/projection">3-Year Projection</a>
    <a href="/valuation">Valuation</a>
    <a href="/progress">System Progress</a>
</div>

<div class="content">

    <div class="d-flex justify-content-end mb-3">
        <button class="toggle-btn" onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>
    </div>

    {% block content %}{% endblock %}

</div>
</body>
</html>
