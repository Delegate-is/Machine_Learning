{% extends "base.html" %}
{% block content %}

<div class="mb-4">
    <img src="https://images.unsplash.com/photo-1546445317-29f4545e9d53?w=800" class="img-fluid rounded shadow">
</div>

<h2>Add Cow</h2>

<form action="/add_cow" method="POST">
    <div class="mb-3">
            <label class="form-label">Cow Tag Number</label>
            <input type="text" name="tag_number" class="form-control" placeholder="e.g. C001">
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Cow Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Bessie">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Breed</label>
            <input type="text" name="breed" class="form-control" placeholder="e.g. Holstein">
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Weight (kg)</label>
            <input type="number" step="0.1" name="weight_kg" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Birth Date</label>
            <input type="date" name="birth_date" class="form-control">
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Status</label>
        <select class="form-control" name="status">
            <option value="Active">Active</option>
            <option value="Lactating">Lactating</option>
            <option value="Quarantined">Quarantined</option>
            <option value="Dry">Dry</option>
            <option value="Sold">Sold</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary w-100">Register Cow</button>
</form>

{% endblock %}
