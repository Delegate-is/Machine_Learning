{% extends "base.html" %}
{% block content %}

<h2>Add Milk Record</h2>

<div class="mb-4">
    <img src="https://source.unsplash.com/1200x400/?milk,dairy" class="img-fluid rounded shadow">
</div>

<form action="/add_milk" method="POST">
    <div class="mb-3">
        <label class="form-label">Select Cow</label>
        <select class="form-control" name="cow_id" required>
            {% for cow in cows %}
            <option value="{{ cow.id }}">{{ cow.name }} ({{ cow.tag_number }})</option>
            {% endfor %}
        </select>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Litres Produced</label>
            <input type="number" step="0.1" name="litres" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Milking Session</label>
            <select class="form-control" name="session">
                <option value="AM">Morning (AM)</option>
                <option value="PM">Evening (PM)</option>
            </select>
        </div>
    </div>
    <button type="submit" class="btn btn-success">Save Production Record</button>
</form>

{% endblock %}
