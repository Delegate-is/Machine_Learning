<!DOCTYPE html>
<html>
<head>
    <title>Njuwan Farm Intelligence</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            transition: 0.3s ease;
        }

        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            background: #1b4332;
            padding-top: 20px;
            color: white;
        }

        .sidebar a {
            display: block;
            color: #d8f3dc;
            padding: 12px 20px;
            text-decoration: none;
            font-weight: 500;
        }

        .sidebar a:hover {
            background: #2d6a4f;
            color: white;
        }

        .content {
            margin-left: 260px;
            padding: 30px;
        }

        .card {
            border: none;
            border-radius: 15px;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .hero {
            background: linear-gradient(to right, #2d6a4f, #40916c);
            color: white;
            padding: 30px;
            border-radius: 20px;
        }

        .dark-mode {
            background-color: #121212 !important;
            color: #e0e0e0 !important;
        }

        .dark-mode .card {
            background-color: #1e1e1e;
            color: white;
        }

        .toggle-btn {
            cursor: pointer;
            font-size: 14px;
            background: #40916c;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
        }
    </style>
</head>

<body>
# For login & logout pages
<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

<div class="sidebar" id="sidebar">
    <h6 class="text-center text-white mb-4">🌾 Njuwan ERP</h6>
    <a href="/">Dashboard</a>
    <a href="/add_cow">Add Cow</a>
    <a href="/add_crop">Add Crop</a>
    <a href="/feed-efficiency">Feed</a>
    <a href="/projection">Projection</a>
    <a href="/valuation">Valuation</a>
    <a href="/logout">Logout</a>
</div>

<div class="content fade-in" id="content">

    <div class="topbar">
        <button class="btn btn-custom" onclick="toggleSidebar()">☰</button>
    </div>

    {% block content %}{% endblock %}
</div>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.getElementById("content").classList.toggle("expanded");
}
</script>

</body>
</html>
